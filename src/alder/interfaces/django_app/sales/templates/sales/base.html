<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Alder ERP{% endblock %}</title>
  <style>
    :root { --bg:#0b0d10; --fg:#e6edf3; --mut:#9aa4ad; --acc:#49b882; --card:#151a21; }
    body { font-family: system-ui, sans-serif; margin:0; background:var(--bg); color:var(--fg); }
    header { padding:1rem 2rem; background:var(--card); border-bottom:1px solid #222; }
    header a { color:var(--fg); text-decoration:none; margin-right:1rem; font-weight:600; }
    header a.acc { color:var(--acc); }
    main { max-width:1100px; margin:2rem auto; padding:0 1rem; }
    h1,h2 { margin-top:0; }
    table { width:100%; border-collapse:collapse; background:var(--card); }
    th,td { padding:.6rem .8rem; border-bottom:1px solid #222; text-align:left; }
    th { color:var(--mut); font-weight:500; font-size:.85rem; text-transform:uppercase; }
    .pill { padding:2px 8px; border-radius:999px; font-size:.75rem; background:#243; color:#8fe0a8; }
    .pill.pending { background:#332a15; color:#e7c271; }
    .pill.ready { background:#153326; color:#63d59b; }
    .pill.delivered { background:#1c2033; color:#8ba4e0; }
    .pill.cancelled { background:#332020; color:#e07777; }
    .card { background:var(--card); padding:1.5rem; border-radius:8px; margin-bottom:1rem; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; }
    .kpi { background:var(--card); padding:1rem; border-radius:8px; }
    .kpi .v { font-size:2rem; font-weight:700; color:var(--acc); }
    .kpi .l { color:var(--mut); text-transform:uppercase; font-size:.75rem; }
    button, .btn { background:var(--acc); color:#051; border:none; padding:.55rem 1.1rem; border-radius:6px; cursor:pointer; font-weight:600; text-decoration:none; display:inline-block; }
    input, select, textarea { background:#0e1318; color:var(--fg); border:1px solid #23303b; padding:.4rem .6rem; border-radius:4px; width:100%; }
    label { display:block; color:var(--mut); font-size:.8rem; margin:.4rem 0 .2rem; }
    .msg { padding:.6rem 1rem; margin:.4rem 0; border-radius:4px; background:#1e3326; color:#8fe0a8; }
    .msg.error { background:#331e1e; color:#e08a8a; }
  </style>
</head>
<body>
  <header>
    <a class="acc" href="{% url 'sales:dashboard' %}">Alder</a>
    <a href="{% url 'sales:list' %}">Sales</a>
    <a href="{% url 'sales:new' %}">New Sale</a>
    <a href="{% url 'sales:client_new' %}">New Client</a>
  </header>
  <main>
    {% if messages %}
      {% for m in messages %}
        <div class="msg {% if m.tags == 'error' %}error{% endif %}">{{ m }}</div>
      {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
